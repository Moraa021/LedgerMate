{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="auth-container" style="max-width: 400px; margin: 0 auto;">
    <h1 data-en="Login to LedgerMate" data-sw="Ingia kwa LedgerMate">Login to LedgerMate</h1>
    
    <form method="POST" class="auth-form">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-group">
            <label for="phone_number" data-en="Phone Number" data-sw="Nambari ya Simu">Phone Number</label>
            <input type="tel" 
                   class="form-control" 
                   id="phone_number" 
                   name="phone_number" 
                   required 
                   placeholder="0712345678"
                   data-en-placeholder="Enter phone number"
                   data-sw-placeholder="Weka nambari ya simu">
        </div>
        
        <div class="form-group">
            <label for="password" data-en="Password" data-sw="Nywila">Password</label>
            <input type="password" 
                   class="form-control" 
                   id="password" 
                   name="password" 
                   required
                   data-en-placeholder="Enter password"
                   data-sw-placeholder="Weka nywila">
        </div>
        
        <div class="form-group">
            <label>
                <input type="checkbox" name="remember">
                <span data-en="Remember me" data-sw="Nikumbuke">Remember me</span>
            </label>
        </div>
        
        <button type="submit" class="btn btn-primary btn-block">
            <i class="fas fa-sign-in-alt"></i>
            <span data-en="Login" data-sw="Ingia">Login</span>
        </button>
    </form>
    
    <p style="text-align: center; margin-top: 20px;">
        <span data-en="Don't have an account?" data-sw="Huna akaunti?">Don't have an account?</span>
        <a href="{{ url_for('auth.register') }}" data-en="Register" data-sw="Jisajili">Register</a>
    </p>
</div>
{% endblock %}
