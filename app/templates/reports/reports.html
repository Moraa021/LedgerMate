{% extends "base.html" %}

{% block title %}Reports{% endblock %}

{% block content %}
<div class="reports" style="max-width: 1200px; margin: 0 auto; padding: 20px;">
    <h1 style="margin-bottom: 25px; font-weight: 700;" data-en="Financial Reports" data-sw="Ripoti za Kifedha">Financial Reports</h1>
    
    <div class="card" style="background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; margin-bottom: 30px;">
        <h3 style="margin-bottom: 20px;" data-en="Generate Report" data-sw="Tengeneza Ripoti">Generate Report</h3>
        
        <div class="filter-section">
            <div class="form-group" style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; font-weight: 600;" data-en="Report Period" data-sw="Kipindi cha Ripoti">Report Period</label>
                <div class="period-selector" style="display: flex; gap: 10px; flex-wrap: wrap;">
                    <button type="button" class="period-btn btn btn-outline-primary active" onclick="setPeriod('daily', event)" data-en="Daily" data-sw="Kila Siku">Daily</button>
                    <button type="button" class="period-btn btn btn-outline-primary" onclick="setPeriod('weekly', event)" data-en="Weekly" data-sw="Kila Wiki">Weekly</button>
                    <button type="button" class="period-btn btn btn-outline-primary" onclick="setPeriod('monthly', event)" data-en="Monthly" data-sw="Kila Mwezi">Monthly</button>
                    <button type="button" class="period-btn btn btn-outline-primary" onclick="setPeriod('custom', event)" data-en="Custom" data-sw="Maalum">Custom</button>
                </div>
            </div>
            
            <div id="customDateRange" style="display: none; margin-bottom: 20px;">
                <div class="row">
                    <div class="col-md-6 form-group">
                        <label for="from_date" data-en="From Date" data-sw="Kuanzia Tarehe">From Date</label>
                        <input type="date" class="form-control" id="from_date">
                    </div>
                    <div class="col-md-6 form-group">
                        <label for="to_date" data-en="To Date" data-sw="Mpaka Tarehe">To Date</label>
                        <input type="date" class="form-control" id="to_date">
                    </div>
                </div>
            </div>
            
            <div class="row">
                <div class="col-md-6 form-group" style="margin-bottom: 20px;">
                    <label style="font-weight: 600;" data-en="Transaction Type" data-sw="Aina ya Muamala">Transaction Type</label>
                    <select class="form-control" id="reportType">
                        <option value="all" data-en="All Transactions" data-sw="Miamala Yote">All Transactions</option>
                        <option value="income" data-en="Income Only" data-sw="Mapato Tu">Income Only</option>
                        <option value="expense" data-en="Expense Only" data-sw="Matumizi Tu">Expense Only</option>
                    </select>
                </div>
                
                <div class="col-md-6 form-group" style="margin-bottom: 20px;">
                    <label style="font-weight: 600;" data-en="Category" data-sw="Aina">Category Filter (For Export)</label>
                    <select class="form-control" id="reportCategory">
                        <option value="all" data-en="All Categories" data-sw="Aina Zote">All Categories</option>
                    </select>
                </div>
            </div>

            <div class="export-options mb-3">
                <label class="fw-bold d-block mb-2">Export Report</label>
                <div class="btn-group w-100">
                    <button class="btn btn-outline-secondary" onclick="exportReport('pdf')"><i class="fas fa-file-pdf"></i> PDF</button>
                    <button class="btn btn-outline-secondary" onclick="exportReport('csv')"><i class="fas fa-file-csv"></i> CSV</button>
                    <button class="btn btn-outline-secondary" onclick="exportReport('excel')"><i class="fas fa-file-excel"></i> Excel</button>
                </div>
            </div>
            
            <button class="btn btn-primary btn-block w-100 py-2" id="generateBtn" onclick="generateReport()">
                <i class="fas fa-chart-line"></i>
                <span data-en="Generate Report" data-sw="Tengeneza Ripoti">Generate Report</span>
            </button>
        </div>
    </div>
    
    <div class="card" id="reportResults" style="display: none; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border: 1px solid #e2e8f0;">
        <div class="report-header d-flex justify-content-between align-items-start mb-4">
            <h3 data-en="Report Results" data-sw="Matokeo ya Ripoti">Report Results</h3>
            <div class="summary-stats text-end">
                <p style="margin-bottom: 5px;"><strong data-en="Total Income:" data-sw="Jumla ya Mapato:">Total Income:</strong> <span id="reportIncome" class="text-success fw-bold">KES 0</span></p>
                <p style="margin-bottom: 5px;"><strong data-en="Total Expense:" data-sw="Jumla ya Matumizi:">Total Expense:</strong> <span id="reportExpense" class="text-danger fw-bold">KES 0</span></p>
                <p style="margin-bottom: 0;"><strong data-en="Net:" data-sw="Usawa:">Net:</strong> <span id="reportNet" class="fw-bold">KES 0</span></p>
            </div>
        </div>
        
        <div class="chart-container" style="position: relative; height: 300px; margin-bottom: 40px;">
            <canvas id="reportChart"></canvas>
        </div>
        
        <div class="report-table-wrapper" style="border: 1px solid #dee2e6; border-radius: 8px; overflow-x: auto;">
            <table class="table table-bordered table-hover mb-0" id="mainReportTable">
                <thead class="table-light">
                    <tr>
                        <th data-en="Date" data-sw="Tarehe">Date</th>
                        <th data-en="Type" data-sw="Aina">Type</th>
                        <th data-en="Description" data-sw="Maelezo">Description</th>
                        <th data-en="Payment" data-sw="Malipo">Payment</th>
                        <th data-en="Amount" data-sw="Kiasi">Amount</th>
                    </tr>
                </thead>
                <tbody id="reportTableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<style>
    .period-btn.active { background-color: #0d6efd !important; color: white !important; }
    .income-text { color: #198754; font-weight: 600; }
    .expense-text { color: #dc3545; font-weight: 600; }
    .table-bordered th, .table-bordered td {
        border: 1px solid #dee2e6 !important;
        vertical-align: middle;
        padding: 12px;
        white-space: nowrap;
    }
</style>
{% endblock %}

{% block extra_js %}
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
let currentPeriod = 'daily';
let reportChart = null;

document.addEventListener('DOMContentLoaded', loadCategories);

function loadCategories() {
    fetch('/categories/api/list').then(res => res.json()).then(data => {
        if (data.success) {
            const select = document.getElementById('reportCategory');
            while (select.options.length > 1) { select.remove(1); }
            data.categories.forEach(cat => {
                const opt = document.createElement('option');
                opt.value = cat.id; opt.textContent = cat.name;
                select.appendChild(opt);
            });
        }
    });
}

function setPeriod(period, event) {
    currentPeriod = period;
    document.querySelectorAll('.period-btn').forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById('customDateRange').style.display = (period === 'custom') ? 'block' : 'none';
}

function generateReport() {
    const btn = document.getElementById('generateBtn');
    btn.disabled = true; btn.innerHTML = 'Generating...';

    const params = new URLSearchParams({
        period: currentPeriod,
        type: document.getElementById('reportType').value,
        category: document.getElementById('reportCategory').value
    });
    
    if (currentPeriod === 'custom') {
        params.append('from_date', document.getElementById('from_date').value);
        params.append('to_date', document.getElementById('to_date').value);
    }
    
    fetch(`/reports/api/generate?${params.toString()}`)
        .then(res => res.json())
        .then(data => { if (data.success) displayReport(data); })
        .finally(() => { btn.disabled = false; btn.innerHTML = 'Generate Report'; });
}

function displayReport(data) {
    document.getElementById('reportResults').style.display = 'block';
    document.getElementById('reportIncome').textContent = `KES ${data.summary.income.toLocaleString()}`;
    document.getElementById('reportExpense').textContent = `KES ${data.summary.expense.toLocaleString()}`;
    document.getElementById('reportNet').textContent = `KES ${data.summary.net.toLocaleString()}`;
    
    if (reportChart) reportChart.destroy();
    reportChart = new Chart(document.getElementById('reportChart'), {
        type: 'bar',
        data: {
            labels: data.chart_data.labels,
            datasets: [
                { label: 'Income', data: data.chart_data.income, backgroundColor: '#198754' },
                { label: 'Expense', data: data.chart_data.expense, backgroundColor: '#dc3545' }
            ]
        },
        options: { responsive: true, maintainAspectRatio: false }
    });

    const tbody = document.getElementById('reportTableBody');
    tbody.innerHTML = '';
    
    data.transactions.forEach(t => {
        const typeClass = t.type === 'income' ? 'income-text' : 'expense-text';
        // Category TD REMOVED from the table generation logic
        tbody.innerHTML += `
            <tr>
                <td>${t.date}</td>
                <td class="${typeClass} fw-bold">${t.type.toUpperCase()}</td>
                <td>${t.description || '-'}</td>
                <td>${t.payment_method || 'Cash'}</td>
                <td class="${typeClass} text-end">KES ${t.amount.toLocaleString()}</td>
            </tr>`;
    });
}

function exportReport(format) {
    const params = new URLSearchParams({
        period: currentPeriod,
        type: document.getElementById('reportType').value,
        category: document.getElementById('reportCategory').value,
        format: format
    });
    if (currentPeriod === 'custom') {
        params.append('from_date', document.getElementById('from_date').value);
        params.append('to_date', document.getElementById('to_date').value);
    }
    window.location.href = `/reports/api/export?${params.toString()}`;
}
</script>
{% endblock %}
