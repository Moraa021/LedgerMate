{% extends "base.html" %}

{% block title %}Add Transaction{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="card shadow-sm border-0 mx-auto" style="max-width: 600px; border-radius: 15px;">
        <div class="card-body p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="fw-bold m-0">New Transaction</h3>
                <a href="{{ url_for('transactions.transactions') }}" class="btn-close" aria-label="Close"></a>
            </div>
            
            <form method="POST" id="transactionForm">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                
                <div class="mb-4">
                    <label class="form-label d-block fw-bold small text-muted text-uppercase mb-2">Transaction Type</label>
                    <div class="btn-group w-100" role="group">
                        <input type="radio" class="btn-check" name="type" id="type_income" value="income" checked autocomplete="off">
                        <label class="btn btn-outline-success py-2 fw-bold" for="type_income">
                            <i class="fas fa-plus-circle me-1"></i> INCOME
                        </label>

                        <input type="radio" class="btn-check" name="type" id="type_expense" value="expense" autocomplete="off">
                        <label class="btn btn-outline-danger py-2 fw-bold" for="type_expense">
                            <i class="fas fa-minus-circle me-1"></i> EXPENSE
                        </label>
                    </div>
                </div>

                <div class="row g-3 mb-3">
                    <div class="col-7">
                        <label class="form-label fw-bold small text-uppercase">Amount (KES)</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0">Sh</span>
                            <input type="number" name="amount" class="form-control form-control-lg border-start-0" step="0.01" required placeholder="0.00">
                        </div>
                    </div>
                    <div class="col-5">
                        <label class="form-label fw-bold small text-uppercase">Date</label>
                        <input type="date" name="transaction_date" class="form-control form-control-lg" value="{{ today }}">
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold small text-uppercase">Category</label>
                    <select name="category_id" id="categorySelect" class="form-select form-select-lg" required>
                        <option value="" disabled selected>Choose a category...</option>
                        {% for category in categories %}
                        <option value="{{ category.id }}" data-type="{{ category.type }}">
                            {{ category.icon or '📁' }} {{ category.name }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold small text-uppercase">Payment Method</label>
                    <select name="payment_method" id="paymentMethod" class="form-select form-select-lg" required>
                        <option value="cash">Cash</option>
                        <option value="mpesa">M-Pesa</option>
                        <option value="bank">Bank Transfer</option>
                    </select>
                </div>

                <div class="mb-3 d-none animate__animated animate__fadeIn" id="mpesaGroup">
                    <label class="form-label small fw-bold text-primary text-uppercase">M-Pesa Confirmation Code</label>
                    <div class="input-group">
                        <span class="input-group-text bg-primary text-white"><i class="fas fa-mobile-alt"></i></span>
                        <input type="text" name="mpesa_code" id="mpesa_code" class="form-control border-primary" placeholder="e.g. RBT45X90" style="text-transform: uppercase;">
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold small text-uppercase">Description</label>
                    <input type="text" name="description" class="form-control" placeholder="What was this for?">
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold small text-uppercase text-muted">Additional Notes (Optional)</label>
                    <textarea name="additional_info" class="form-control" rows="2" placeholder="Any extra details..."></textarea>
                </div>

                <button type="submit" class="btn btn-dark w-100 py-3 fw-bold shadow-sm rounded-pill">
                    <i class="fas fa-check-circle me-2"></i>SAVE TRANSACTION
                </button>
            </form>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    // Selectors
    const typeRadios = document.querySelectorAll('input[name="type"]');
    const categorySelect = document.getElementById('categorySelect');
    const categoryOptions = categorySelect.querySelectorAll('option');
    const paymentMethodSelect = document.getElementById('paymentMethod');
    const mpesaGroup = document.getElementById('mpesaGroup');
    const mpesaInput = document.getElementById('mpesa_code');

    // --- Logic 1: Filter Categories by Type (Income/Expense) ---
    function filterCategories() {
        const activeType = document.querySelector('input[name="type"]:checked').value;
        categorySelect.value = ""; // Clear current selection
        
        categoryOptions.forEach(opt => {
            if (!opt.value) return; // Skip placeholder
            const optType = opt.getAttribute('data-type');
            opt.style.display = (optType === activeType) ? 'block' : 'none';
        });
    }

    // --- Logic 2: Toggle M-Pesa Code Visibility ---
    function toggleMpesaField() {
        if (paymentMethodSelect.value === 'mpesa') {
            mpesaGroup.classList.remove('d-none');
            mpesaInput.setAttribute('required', 'true');
        } else {
            mpesaGroup.classList.add('d-none');
            mpesaInput.removeAttribute('required');
            mpesaInput.value = ""; // Clear if hidden
        }
    }

    // Event Listeners
    typeRadios.forEach(radio => radio.addEventListener('change', filterCategories));
    paymentMethodSelect.addEventListener('change', toggleMpesaField);

    // Run on startup
    filterCategories();
    toggleMpesaField();
});
</script>

<style>
    /* Styling to make the form look modern */
    .form-control-lg, .form-select-lg {
        border-radius: 10px;
        font-size: 1rem;
    }
    .btn-group .btn {
        border-radius: 10px !important;
        margin: 0 5px;
    }
    .card {
        background: #fdfdfd;
    }
</style>
{% endblock %}
